<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" role="img" aria-label="Angler Watersports">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#F0B832"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
  </defs>
  <!-- Oval badge -->
  <ellipse cx="240" cy="80" rx="232" ry="72" fill="#0E1A2E"/>
  <ellipse cx="240" cy="80" rx="232" ry="72" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <ellipse cx="240" cy="80" rx="222" ry="62" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.55"/>

  <!-- Gold swoosh (lower-left) -->
  <path d="M 55 118 Q 95 92 175 102 Q 120 112 75 128 Z" fill="url(#gold)" opacity="0.75"/>

  <!-- Vessel glyphs: minimalist pontoon + jet-ski silhouettes above the wordmark -->
  <g transform="translate(140, 32)" fill="#F5F5F0">
    <rect x="0" y="14" width="64" height="8" rx="1"/>
    <rect x="6" y="22" width="52" height="4"/>
    <rect x="14" y="0" width="36" height="14" rx="2" fill="none" stroke="#F5F5F0" stroke-width="2"/>
    <line x1="20" y1="0" x2="20" y2="14" stroke="#F5F5F0" stroke-width="1.5"/>
    <line x1="44" y1="0" x2="44" y2="14" stroke="#F5F5F0" stroke-width="1.5"/>
  </g>
  <g transform="translate(230, 40)" fill="#F5F5F0">
    <path d="M 0 10 Q 12 2 30 6 L 40 10 L 0 10 Z"/>
    <circle cx="22" cy="4" r="3.5" fill="#F5F5F0"/>
  </g>
  <path d="M 275 52 Q 285 56 295 50 Q 305 44 315 48" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 150 58 Q 160 62 170 58 Q 180 54 190 58" stroke="#3B82F6" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Wordmark: ANGLER (heavy, slight italic) -->
  <text x="240" y="108" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-weight="900" font-size="52" fill="#F5F5F0" letter-spacing="3" font-style="italic">ANGLER</text>

  <!-- Sub-wordmark: — WATERSPORTS — -->
  <line x1="128" y1="132" x2="162" y2="132" stroke="#D4A017" stroke-width="2"/>
  <text x="240" y="136" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-weight="800" font-size="14" fill="#E5B233" letter-spacing="5">WATERSPORTS</text>
  <line x1="318" y1="132" x2="352" y2="132" stroke="#D4A017" stroke-width="2"/>
</svg>
